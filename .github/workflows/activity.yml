name: Update Activity

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update activity
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { data: events } = await github.rest.activity.listEventsForAuthenticatedUser({
              per_page: 5
            });
            
            let activity = '';
            events.forEach((event, index) => {
              const repo = event.repo.name;
              const type = event.type;
              let action = '';
              
              if (type === 'PushEvent') action = '→ Pushed to';
              else if (type === 'PullRequestEvent') action = '→ PR on';
              else if (type === 'IssuesEvent') action = '→ Issue on';
              else if (type === 'CreateEvent') action = '→ Created';
              else if (type === 'WatchEvent') action = '→ Starred';
              else action = '→ Activity on';
              
              const date = new Date(event.created_at).toLocaleDateString();
              activity += `${index + 1}. ${action} ${repo} (${date})\n`;
            });
            
            let readme = fs.readFileSync('README.md', 'utf8');
            const startMarker = '<!--START_SECTION:activity-->';
            const endMarker = '<!--END_SECTION:activity-->';
            
            const startIndex = readme.indexOf(startMarker);
            const endIndex = readme.indexOf(endMarker);
            
            if (startIndex !== -1 && endIndex !== -1) {
              readme = readme.substring(0, startIndex + startMarker.length) + 
                       '\n' + activity + '\n' +
                       readme.substring(endIndex);
              fs.writeFileSync('README.md', readme);
            }

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update activity" && git push)

