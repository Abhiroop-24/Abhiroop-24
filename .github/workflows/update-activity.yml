name: Update Activity Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity
        run: |
          cat > update_activity.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');
          
          function fetchEvents() {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.github.com',
                path: '/users/Abhiroop-24/events?per_page=5',
                method: 'GET',
                headers: {
                  'User-Agent': 'GitHub-Actions',
                  'Authorization': `token ${process.env.GITHUB_TOKEN}`
                }
              };
              
              https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on('error', reject).end();
            });
          }
          
          async function updateReadme() {
            try {
              const events = await fetchEvents();
              let activity = '';
              
              events.slice(0, 5).forEach((event, i) => {
                const repo = event.repo.name;
                const type = event.type;
                let action = '';
                
                if (type === 'PushEvent') action = '→ Pushed to';
                else if (type === 'PullRequestEvent') action = '→ PR on';
                else if (type === 'IssuesEvent') action = '→ Issue on';
                else if (type === 'CreateEvent') action = '→ Created';
                else if (type === 'WatchEvent') action = '→ Starred';
                else action = '→ Activity on';
                
                const date = new Date(event.created_at).toLocaleDateString();
                activity += `${i + 1}. ${action} ${repo} (${date})\n`;
              });
              
              let readme = fs.readFileSync('README.md', 'utf8');
              const startMarker = '<!--START_SECTION:activity-->';
              const endMarker = '<!--END_SECTION:activity-->';
              
              const startIdx = readme.indexOf(startMarker);
              const endIdx = readme.indexOf(endMarker);
              
              if (startIdx !== -1 && endIdx !== -1) {
                const before = readme.substring(0, startIdx + startMarker.length);
                const after = readme.substring(endIdx);
                readme = before + '\n' + activity + '\n' + after;
                fs.writeFileSync('README.md', readme);
                console.log('✓ Activity updated');
              } else {
                console.log('✗ Markers not found');
              }
            } catch (error) {
              console.error('Error:', error.message);
              process.exit(1);
            }
          }
          
          updateReadme();
          SCRIPT
          
          node update_activity.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update activity"
            git push
          fi
